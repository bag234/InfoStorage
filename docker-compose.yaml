services:
  app:
    image: 10.9.0.4:5500/contact:latest
    container_name: info-storage
    ports:
      - "127.0.0.1:8885:8080"
      - "10.9.0.1:8885:8080"
    environment:
      # Logging to json
      - LOGGING_CONFIG=/conf/json.xml
      # Config app
      - APP_DATA_MAINURI=redis://redis:6379/2
      #Admin
      - SPRING_BOOT_ADMIN_CLIENT_URL=http://10.9.0.3:8084
      - SPRING_BOOT_ADMIN_CLIENT_INSTANCE_SERVICE-URL=http://10.9.0.1:8885/
      - SPаRING_BOOT_ADMIN_CLIENT_INSTANCE_MANAGEMENT-URL=http://10.9.0.1:8885/actuator
      - SPRING_BOOT_ADMIN_CLIENT_INSTANCE_HEALTH-URL=http://10.9.0.1:8885/actuator/health
      - SPRING_BOOT_ADMIN_CLIENT_USERNAME=app
      - SPRING_BOOT_ADMIN_CLIENT_PASSWORD=app-supet-p@22w0rd
    restart: unless-stopped
    volume: 
      - ./jsonlog.xml:/conf/json.xml:ro

  redis:
    image: "redis:7"
    container_name: redis-info-strage
    restart: unless-stopped
    volumes:
      - redis-data:/data

volumes:
  redis-data: